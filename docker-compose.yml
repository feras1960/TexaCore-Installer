# TexaCore ERP — Installer Docker Compose
# Managed by TexaCore Desktop App

services:
  erp:
    image: texacore-web:1.0.0
    container_name: texacore-erp
    restart: unless-stopped
    environment:
      LICENSE_KEY: ${LICENSE_KEY}
      LICENSING_SERVER_URL: https://wzkklenfsaepegymfxfz.supabase.co/functions/v1
      APP_VERSION: "1.0.0"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "${APP_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
